name: Build & Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/**.csv'       # rebuild when data changes
      - 'build.py'          # rebuild when the builder changes
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit docs/index.html back to repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas thefuzz python-Levenshtein

      - name: Build static dashboard
        run: python build.py --data-dir ./data --out ./docs

      - name: Commit & push docs/index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Auto-rebuild dashboard [skip ci]"
          git push
